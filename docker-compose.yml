version: '3.8'

services:
  database:
    image: postgres:15
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  trainee_backend:
    build: ./backend
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: pass
      DB_NAME: mydb
      PORT: 5000
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend-net

  trainee_frontend:
    build: ./frontend
    depends_on:
      - trainee_backend
    networks:
      - frontend-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - trainee_frontend
      - trainee_backend
    networks:
      - frontend-net

volumes:
  frontend_dist:

networks:
  backend-net:
  frontend-net:
